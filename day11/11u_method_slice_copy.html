<!--
1lu. In exercise Ilt, one problem with reverse() is that it doesn't create a
copy of the array it is reversing. It modifies the original array. Update
the code so the function does not modify the original array. (Hint:
use the slice() method to create a copy of an array's values).
• const foods = ['egg', 'apple, 'egg', 'egg', 'ham'];
• console.log(removeEgg(foods)) => ['egg', 'apple', 'ham']
• console.log(foods) => ['egg', 'apple', 'egg', 'egg', 'ham']
-->

<!DOCTYPE html>
<html>
<head></head>
<body>
<script>
  const arr1 = ['egg', 'apple', 'egg', 'egg', 'ham'];
  let copy=[];
  copy = arr1.slice(); // slice is used to copy the existing array to an new variable

  function removeWord(words, search) {
    words=words.reverse();
    let goodWords=[];
    let rword=0;
    for (let i = 0; i < words.length; i++) {
      if (words[i] === search && rword<2) {
        rword++;
        continue;   
      }
      else {
        goodWords.push(words[i]);
      }
      }
      return goodWords.reverse();
      }
  
  console.log("The Array after words removed is   =  ")
  console.log(removeWord(copy, 'egg'));    // removing first two egg for total array


  console.log(`The original array is ${arr1}`);
</script>
</body>
</html>
