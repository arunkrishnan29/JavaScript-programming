<!--
11k. Create a function countPositive(nums) that takes an array of numbers
and returns how many numbers in the array are greater than O.
• countPositive([1, -3, 5]) => 2
• countPositive([-2, 3, -5, 7, 10]) => 3
-->

<!DOCTYPE html>
<html>
<head>
</head>
<body>
<script>

function countPositive(nums) {
    let count = 0;

    for (let i = 0; i < nums.length; i++) {
        if (nums[i] > 0) {
            count++;
        }
    }

    return count;
}

console.log(countPositive([1, -3, 5]));          // 2
console.log(countPositive([-2, 3, -5, 7, 10]));  // 3

</script>
</body>
</html>
