      function countWords(words) {
        const result = {};

        for (let i = 0; i < words.length; i++) {
          const word = words[i];

        
          if (word==='apple') {
            console.log(`The index num is ${[i]},The word is ${word}`)
          } 
          else if  (word!=='apple'){
            console.log(`not found,${words[-1]}`);
            i++;

          }
          
        }
      }
