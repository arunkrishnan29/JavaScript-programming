<!DOCTYPE html>
<html>
<head></head>
<body>
<script>
  const arr1 = ['egg', 'apple', 'egg', 'egg', 'ham'];

  function removeWord(words, search) {
    let goodWords=[];
    for (let i = 0; i < words.length; i++) {
      if (words[i] === search) {
        continue;   
      }
      else {
        goodWords.push(words[i]);
      }
      }
      return goodWords;
      }
  

  console.log(removeWord(arr1, 'egg'));    // 1
</script>
</body>
