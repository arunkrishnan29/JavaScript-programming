<!DOCTYPE html>
<html>
<head></head>
<body>
<script>const arr1 = ['green', 'red', 'blue', 'red', 'red', 'blue', 'green'];

function findIndex(words, search) {
  for (let i = 0; i < words.length; i++) {
    if (words[i] === search) {
      return i;
    }
  }
  return -1;
}

function unique(array) {
  let goodWords = [];

  for (let i = 0; i < array.length; i++) {
    const firstIndex = findIndex(array, array[i]);

    if (i === firstIndex) {
      goodWords.push(array[i]);
    }
  }

  return goodWords;
}

console.log(unique(arr1));
</script>
