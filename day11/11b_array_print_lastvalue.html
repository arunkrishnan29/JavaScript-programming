<!--
11b. Create a function getLastValue(array) that takes an array and returns
the last value in the array. Hint: array indexes start at 0 so the last
index is the number of values in the array minus 1
(lastIndex = array.length - 1).
• getLastValue([1, 20, 22, 24, 5]) => 5
• getLastValue(['hi, 'hello', 'good']) =>'good'
-->


<!DOCTYPE>
<html>
    <head>
    </head>
    <body>
        <script>

            const arr1=[10,20,30];
            const arr2=[11,22,33];
            const arr3=['Hi','Hello','Welcome'];

            console.log(arr1,getLastValue(arr1,1));
            console.log(arr2,getLastValue(arr2,2));
            console.log(arr3,getLastValue(arr3,3));

            function getLastValue(array1,n){
            for(i=0;i<array1.length;i++){
                const  lastIndexvalue=array1.length-1;
                console.log(`last element in array${n} = `,array1[lastIndexvalue]);
                }
            }
        </script>
    </body>
</html>
