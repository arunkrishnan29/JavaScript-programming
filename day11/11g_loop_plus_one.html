<!--
11g. Create a loop that takes an array of numbers and creates a new array
where each number is increased by 1.
• [1, 2, 3] => [2, 3, 4]
-->

<!DOCTYPE>
<html>
    <head>
    </head>
    <body>
        <script>
            
            const array1=[10,20,30,40,50,60,70,80,90];
            console.log("The give array is ",array1);
            console.log("After 1 added " );
            console.log(valplus(array1));

            function valplus(array1){
            for(i=0;i<array1.length;i++){
                const  val=array1[i]+1;
                console.log(val);
               }
            }
                        
        </script>
    </body>
</html>
