<!--
11t. Arrays have a method called reverse(), which reverses the order of
the values in the array. Using reverse(), update exercise 11s to only
remove the last 2 eggs from the array.
• removeEgg(l'egg', 'apple', 'egg', 'egg', 'ham']) = ['egg', 'apple', 'ham']
-->


<!DOCTYPE html>
<html>
<head></head>
<body>
<script>
  const arr1 = ['egg', 'apple', 'egg', 'egg', 'ham'];

  function removeWord(words, search) {
    words=words.reverse();
    let goodWords=[];
    let rword=0;
    for (let i = 0; i < words.length; i++) {
      if (words[i] === search && rword<2) {
        rword++;
        continue;   
      }
      else {
        goodWords.push(words[i]);
      }
      }
      return goodWords.reverse();
      }
  

  console.log(removeWord(arr1, 'egg'));    // removing first two egg for total array
</script>
</body>
</html>
