            function arraySwap(ar,n){
                for(i=0;i<ar.length;i++){
                let temp = ar[0];
                // Swap first and last

                // we are saving the a[0] to the temp no prevent the missing of original value of a[0]
                
                ar[0] = ar[ar.length - 1];
                ar[ar.length - 1] = temp;
                console.log(`swaped array${n} = `,ar[i]);
                }
            }
