11I. Create a function minMax(nums) that takes an array of numbers and
returns an object with the minimum and maximum numbers in the
array (do this using a loop instead of using something like Math.min).
• minMax([1, -3, 5]) => { min: -3, max: 5}
• minMax([-2, 3, -5, 7, 10]) => { min: -5, max: 10 }
-->
<!DOCTYPE html>
<html>
<head>
</head>
<body>
<script>
    
        arr1=[1, -3, 5];          // 2
        arr2=[11,3434,563432,22,2,-2,-1,67];
        console.log("The Given array  =  ",arr1,'Minimun = ');
        console.log(minn(arr1));
        console.log("The Given array  =  ",arr2,'Mininum = ');
        console.log(minn(arr2));


        console.log("The Given array  =  ",arr1,'Maximum = ');
        console.log(maxx(arr1));
        console.log("The Given array  =  ",arr2,'Maximum = ');
        console.log(maxx(arr2));


        function minn(arr){

        let min = arr[0];

        for(let i = 1; i < arr.length; i++)  
        {
            if (arr[i] < min) {
                min = arr[i];
            }
        }
        console.log(min);

        }
        
        function maxx(arr){

        let max = arr[0];

        for(let i = 1; i < arr.length; i++)  
        {
            if (arr[i] > max) {
                max = arr[i];
            }
        }
        console.log(max);
        }


</script>
