<!--
10d. Create the button on the right. When clicking
this button, it should turn ON / OFF. Hints:
• When clicking the button, add or remove the
class 'is-toggled', and use it to change the styling.
• Use if (classList.contains('is-toggled')) to decide
whether to add or remove the 'is-toggled' class.
-->


<!DOCTYPE>
<html>
    <head>

        <title>
            The CSS REVIEW
        </title>

        <p>
            <h2>
            Gammingbutton
            </h2>
        </p>
        <style>
            .gamm{
                background-color: rgb(199, 198, 198);
                color:black;
                
                font-family: Times;
                padding: 8px 8px;
                border-radius: 7px;
                border: none;
            }
            .is-toggled{
                background-color: rgb(0, 0, 0);
                color:rgb(255, 255, 255);
                
                font-family: Times;
                padding: 8px 8px;
                border-radius: 7px;
                border: none;               
            }

        </style>
        <body>
                <button class="gamm is-toggled" onclick="togglebtn() ,console.log('clicked')">
                    GAmming
                </button>
                <script>
                    function togglebtn(){
                    const btn=document.querySelector('.gamm');
                    if (btn.classList.contains('is-toggled')=== true){
                        btn.classList.remove('is-toggled')
                    }
                    else{
                        btn.classList.add('is-toggled')
                    }
                }    
                    
                </script>
        </body>
    </head>
</html>
