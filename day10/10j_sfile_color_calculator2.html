<!-- This uses eval method that is not safer and only suitable for learning purpose -->

<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <h2>
        CALCULATOR
    </h2>

    <!-- Seperate css files -->
    <link rel="stylesheet" href="styles/10j.css">
  </head>

  <body>
    <p class="result" >
        
    </p>
    <p>
      <button class ="num" onclick="updateCalculation('1')">1</button>

      <button class ="num" onclick="updateCalculation('2')">2</button>

      <button class ="num" onclick="updateCalculation('3')">3</button>

      <button class ="symbol" onclick="updateCalculation(' + ')">+</button>
    </p>

    <p>
      <button class ="num" onclick="updateCalculation('4')">4</button>

      <button class ="num" onclick="updateCalculation('5')">5</button>

      <button class ="num" onclick="updateCalculation('6')">6</button>

      <button class ="symbol" onclick="updateCalculation(' - ')">-</button>
    </p>

    <p>
      <button class ="num" onclick="updateCalculation('7')">7</button>

      <button class ="num" onclick="updateCalculation('8')">8</button>

      <button class ="num" onclick="updateCalculation('9')">9</button>

      <button class ="symbol" onclick="updateCalculation(' * ')">*</button>
    </p>

    <p>
      <button class ="num" onclick="updateCalculation('0')">0</button>

      <button class ="symbol" onclick="updateCalculation('.')">.</button>

      <button class="symbol" onclick="
        calculation = eval(calculation);
        console.log(calculation);

        localStorage.setItem('cal', calculation);
        displaycalculation(calculation);
      ">
        =
      </button>

      <button class ="symbol" onclick="updateCalculation(' / ')">/</button>
    </p>

    <p>
      <button class="clear" onclick="
        calculation = '';
        console.log(calculation);

        localStorage.setItem('cal', calculation);
        displaycalculation(calculation);
        displayreset();

      ">
        Clear
      </button>
    </p>
     
    <script src="scripts/10j.js">
      //Seperate js files

    </script>

  </body>
</html>
