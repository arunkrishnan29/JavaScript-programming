<!DOCTYPE>
<html>
    <head>
        <title>
            btn color change
        </title>
        <h4>
            creatring three buttons
        </h4>

        <style>
            .btn1, .btn2, .btn3{
                background-color: rgb(199, 198, 198);
                color:black;
                font-family: Times;
                padding: 8px 8px;
                border-radius: 7px;
                border: none;
            }

            .toggle, .toggle2, .toggle3{
                background-color: rgb(0, 0, 0);
                color:rgb(255, 255, 255);
            }
        </style>
    </head>

    <body>
        <button class="btn1" onclick="check(this, 'toggle')">
            Gamming
        </button>

        <button class="btn2" onclick="check(this, 'toggle2')">
            Music
        </button>

        <button class="btn3" onclick="check(this, 'toggle3')">
            Tech
        </button>

        <script>
            function check(btn, className){
                if(btn.classList.contains(className)){
                    btn.classList.remove(className);
                } else {
                    btn.classList.add(className);
                }
            }
        </script>
    </body>
</html>
