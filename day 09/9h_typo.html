<!--
9h. Let's create the project on the right:
• Whenever we type in the text box,
Type something
update the text on the page.
• To do this, we'll learn another
event called <input onkeyup=".
..."».
• This runs code after we press a key and release it (key comes up).
-->

<!DOCTYPE>
<html>
    <head>
        <title>
            Typing Testing
        </title>

    </head>
        <body>
            <p>
                hello the letters that are typed will be shown below
            </p>
            <p class="result"></p>
            <input placeholder="TypeSomething ..." class="iinput" onkeyup="
               const name=  document.querySelector('.iinput').value;
                document.querySelector('.result').innerHTML=`${name}`
                " >
            <button onclick="
                const name1=  document.querySelector('.iinput').value;
                document.querySelector('.result')
                    .innerHTML=` ${name1}`
                " >
              	 clickhere
            </button>

        </body>
</html>
