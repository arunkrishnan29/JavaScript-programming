<!--
7f. Create a function 'convertTemperature(degrees, unit)' that takes a
number and a unit ('C' or 'F'), and converts it into the other unit.
• convertTemperature(25, 'C') => '77F'
• convertTemperature(86, 'F') => '30C'
Note: return a string, and try to reuse the functions from 7d and 7e.
-->
<!DOCTYPE html>
<html>

<head>
  <title>Functions</title>
</head>

<body>

  <p>
    Given Celsius = 25 <br>
    Expected Fahrenheit = 77F
  </p>

  <button onclick="console.log(convertTemperature(25, 'C'))">
    Convert 25°C to Fahrenheit
  </button>

  <button onclick="console.log(convertTemperature(86, 'F'))">
    Convert 86°F to Celsius
  </button>

  <script>

    // Celsius → Fahrenheit
    function convertToFahrenheit(celsius) {
      return (celsius * 9 / 5) + 32;
    }

    // Fahrenheit → Celsius
    function convertToCelsius(fahrenheit) {
      return (fahrenheit - 32) * 5 / 9;
    }

    // Convert Temperature
    function convertTemperature(degrees, unit) {

      if (unit === 'C') {

        let result = convertToFahrenheit(degrees);
        return `${result}F`;

      } else if (unit === 'F') {

        let result = convertToCelsius(degrees);
        return `${result}C`;

      } else {

        return 'Invalid Unit';

      }
    }

  </script>

</body>

</html>
