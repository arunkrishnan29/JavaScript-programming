<!--
7g. Create a function convertLength(length, from, to) that takes a
number and a unit ('km' or 'miles) and converts the length to another
unit ('km' or 'miles'). Note: 1 mile = 1.6 km (approximately).
• convertLength(50, 'miles', 'km') => '80 km'
• convertLength(32, 'km', 'miles') => '20 miles'
• convertLength(50, 'km', 'km') => '50 km'
-->

<!DOCTYPE html>
<html>

<head>
  <title>Functions</title>
</head>

<body>

  <p>
function
  </p>

  <button onclick="console.log(convertLength(32, 'km', 'miles'))">
    Convert 32 km to miles
  </button>

    <button onclick="console.log(convertLength(50, 'miles','km'))">
    Convert 50 miles to km 
  </button>

      <button onclick="console.log(convertLength(50, 'km', 'km'))">
    Convert 50 km to km 
  </button>

  <script>

    function convertLength(length, from, to) {

      if (from==`km` && to == `miles`){
        let length1=length/1.6;
        console.log(`${length1} ${to}` )
      }
      else if (from== `miles` && to ==`km`){
        let length2=length*1.6;
        console.log(`${length2} ${to}` )

      }
      else{
        console.log(`${length} ${to}` )
      }
    
    }


  </script>

</body>

</html>
