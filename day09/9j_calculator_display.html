<!--
9j. We'll improve the calculator project.
• Make a copy of exercise 8h.
• Whenever we update the calculation, display
it on the page instead of in the console.
• When the page first loads, if a calculation
exists in localStorage, display it on the page.
-->


<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
  </head>

  <body>
    <p class="result" >
        
    </p>
    <p>
      <button onclick="updateCalculation('1')">1</button>

      <button onclick="updateCalculation('2')">2</button>

      <button onclick="updateCalculation('3')">3</button>

      <button onclick="updateCalculation(' + ')">+</button>
    </p>

    <p>
      <button onclick="updateCalculation('4')">4</button>

      <button onclick="updateCalculation('5')">5</button>

      <button onclick="updateCalculation('6')">6</button>

      <button onclick="updateCalculation(' - ')">-</button>
    </p>

    <p>
      <button onclick="updateCalculation('7')">7</button>

      <button onclick="updateCalculation('8')">8</button>

      <button onclick="updateCalculation('9')">9</button>

      <button onclick="updateCalculation(' * ')">*</button>
    </p>

    <p>
      <button onclick="updateCalculation('0')">0</button>

      <button onclick="updateCalculation('.')">.</button>

      <button onclick="
        calculation = eval(calculation);
        console.log(calculation);

        localStorage.setItem('cal', calculation);
        displaycalculation(calculation);
      ">
        =
      </button>

      <button onclick="updateCalculation(' / ')">/</button>
    </p>

    <p>
      <button onclick="
        calculation = '';
        console.log(calculation);

        localStorage.setItem('cal', calculation);
        displaycalculation(calculation);
        displayreset();

      ">
        Clear
      </button>
    </p>

    <script>

      // Get saved value from localStorage.
      // If nothing exists, use an empty string ''.

      let calculation = localStorage.getItem('cal') || '';

      console.log(calculation);
      displaycalculation(calculation);

      function updateCalculation(value) {

        // Add the clicked value to the calculation string
        calculation =calculation+ value;

        // Display in console
        console.log(calculation);
        displaycalculation(calculation);

        // Save updated calculation into localStorage
        localStorage.setItem('cal', calculation);
      }
      function displaycalculation(calculation){
                document.querySelector('.result').innerHTML=` ${calculation}`;
      }
        function displayreset(){
        document.querySelector('.result').innerHTML=` ${0}  `;
        }


    </script>

  </body>
</html>
