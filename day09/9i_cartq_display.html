<!--
9i. We'll improve the Cart Quantity project.
• Make a copy of exercise 7l (see the solution for 7l if needed).
• Create a paragraph (<p></p>) to display the quantity.
• Whenever we update the quantity, display it on the page instead
of in the console. Also, display the quantity when page first loads.
-->

<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
      <p class="result">
              The Cart Quantity is 0
    </p>    
    <button onclick="
        
      showcq(cartQuantity);
    ">Show Quantity</button>

    <button onclick="
      updateCartQuantity(1);
      showcq(cartQuantity);
    ">Add to Cart</button>

    <button onclick="
      updateCartQuantity(2);
      showcq(cartQuantity);

    ">+2</button>

    <button onclick="
      updateCartQuantity(3);
      showcq(cartQuantity);
    ">+3</button>

    <button onclick="
      updateCartQuantity(4);
      showcq(cartQuantity);
    ">+4</button>

    <button onclick="
      updateCartQuantity(5);
      showcq(cartQuantity);
    ">+5</button>

    <button onclick="
      updateCartQuantity(-1);
      showcq(cartQuantity);
    ">Remove from cart</button>

    <button onclick="
      updateCartQuantity(-2);
      showcq(cartQuantity);
    ">-2</button>

    <button onclick="
      updateCartQuantity(-3);
      showcq(cartQuantity);
    ">-3</button>

    <button onclick="
      cartQuantity = 0;
      console.log('Cart was reset.');
      console.log(`Cart quantity: ${cartQuantity}`);
      showcq(cartQuantity);
    ">Reset Cart</button>

    <script>
      let cartQuantity = 0;

      function updateCartQuantity(change) {
        if (cartQuantity + change > 10) {
          alert('The cart is full');
          return;
        }

        if (cartQuantity + change < 0) {
          alert('Not enough items in the cart');
          return;
        }

        cartQuantity += change;
        console.log(`Cart quantity: ${cartQuantity}`);
      }
      function showcq(cartQuantity){
         document.querySelector('.result').innerHTML=`The Cart Quantity is ${cartQuantity}`;
      }
    </script>
 
</body>
</html>
