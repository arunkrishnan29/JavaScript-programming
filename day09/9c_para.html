<!--
9c. Create 2 buttons 'heads' and 'tails', and a
paragraph (<p></p>) underneath. When
clicking the 'heads' button, display
'You chose: heads' in the paragraph. When
the 'tails' button, display 'You chose: tails'.
-->

<!DOCTYPE html>
<html>

<head>
    <title>head_OR_tails</title>
</head>

<body>

    <p>
        Head Or Tails Buttons
    </p>

    <button onclick="
        document.querySelector('.result')
            .innerHTML = 'You chose: heads';
    ">
        Heads
    </button>

    <button onclick="
        document.querySelector('.result')
            .innerHTML = 'You chose: tails';
    ">
        Tails
    </button>
    <p class="result"></p>


</body>

</html>
