<!--
12p. Go back to the earlier exercises in lesson 12 (12c - 12i) and switch the
code to use arrow functions. (When passing a function into another
function, use arrow functions. Otherwise, you can use either syntax.)
-->

<!DOCTYPE html>
<html>
  <head></head>
  <body>
    <!--
      This is the updated code for exercise 12c
      just as an example. Feel free, to update
      12d - 12i as well for more practice.
    -->
    <button class="js-button" onclick="
      updateButton();
    ">Start</button>

    <script>
      function updateButton() {
        const button = document.querySelector('.js-button');

        // The function below was changed
        // to an arrow function.
        setTimeout(() => {
          if (button.innerHTML === 'Start') {
          button.innerHTML = 'Finished!';
          } else {
          button.innerHTML = 'Start';
          }        }, 1000);
      }
    </script>
  </body>
</html>
