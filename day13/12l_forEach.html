<!--
12I. Create a function countPositive(nums) that takes an array of
numbers and returns how many numbers in the array are greater
than O. Create this function using .forEach() instead of a loop.
• countPositive([1, -3, 5]) => 2
• countPositive([-2, 3, - 5, 7, 10]) => 3
-->

<!DOCTYPE>
<html>
  <head> </head>
  <body>
    <script>
      const countpostive =numbers =>{
        let count=0;
        
        numbers.forEach(num  => {
          if (num > 0 ) count++;
        });
        return count;
      }

      console.log(countpostive([1,-4,-5,-7,2,4,-3,4,9,8]));
    </script>
  </body>
</html>
