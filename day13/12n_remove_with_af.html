• removeEgg(l'egg', 'apple, 'egg', 'egg', 'ham']) = ['apple', 'ham']

<!DOCTYPE>
<html>
  <head>
    <title> arrow functions </title>
  </head>
  <body>
    <script> 
      const fruits = ["apple", "banana", "orange", ,"grape", "banana"];

      const result = fruits.filter(fruit => fruit !== ("banana"));

      console.log(result);
</script>
  </body>
</html>
