<!DOCTYPE html>
<html>

  <body>
    <p>
      <button onclick="
        updatecalculation('1');
      ">1</button>

      <button onclick="
        updatecalculation('2');

      ">2</button>

      <button onclick="
              updatecalculation('3');
      ">3</button>

      <button onclick=" 
             updatecalculation('+');

      ">+</button>
    </p>

    <p>
      <button onclick="
                updatecalculation('4');

      <button onclick="
                updatecalculation('5');

      ">5</button>

                updatecalculation('6');

      ">6</button>

      <button onclick="
                updatecalculation('0');

      ">0</button>

                updatecalculation('.');

        calculation = eval(calculation);
        console.log(calculation);
      ">=</button>

      <button onclick="
                updatecalculation('/');

      ">/</button>
    </p>

    <p>
      <button onclick="
        calculation = '';
        console.log('Cleared.');
      ">Clear</button>

    <script>
      let calculation = '';

        function updatecalculation(value) {
        calculation = calculation + value;
        console.log(calculation);
            }
