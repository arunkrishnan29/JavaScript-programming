<!DOCTYPE html>
<html>
  <head>
    <title>
      Coin Flip Guess Game
    </title>
    <p>
      There are two options HEADS and TAILS Guess the correct one from the random values provides by computer to Win the Game
    </p>
  </head>
  <body>

    <button onclick="
      gvalue='HEADS';
      console.log(gvalue);    

      random=Math.random();
      let rvalue='';

      (random>0.5)?
        rvalue='HEADS':
        rvalue='TAILS';

      if (gvalue === rvalue){
        console.log(`Your guess is ${gvalue} and The computer's guess is ${rvalue} YOU WON !!!`);
      }
      else{
        console.log(`Your guess is ${gvalue} and The computer's guess is ${rvalue} YOU LOSE`);
      }
    ">
    HEADS
    </button>

    <button onclick="
      gvalue='TAILS';
      console.log(gvalue);    

      random=Math.random();
      rvalue='';

      if(random>0.5){
        rvalue='HEADS'
      }
      else{
        rvalue='TAILS'
      }

      if (gvalue === rvalue){
        console.log(`Your guess is ${gvalue} and The computer's guess is ${rvalue} YOU WON !!!`);
      }
      else{
        console.log(`Your guess is ${gvalue} and The computer's guess is ${rvalue} YOU LOSE`);
      }
    ">
    TAILS
    </button>


  </body>
</html>
