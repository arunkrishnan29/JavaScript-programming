<!--
8g. Search how to repeat a string many times ('test' 2 times => 'testtest')
-->

<!DOCTYPE>
<html>

<body>
    <script>
        var name='Arunkrishnan';
        console.log(`Printing name as it is == ${name}`);
       
        console.log(` Printing name using repeat(2)  == ${name.repeat(2)} `);

        console.log(` repeat(33) == ${name.repeat(33)} `)
    </script>
</body>
</html>
