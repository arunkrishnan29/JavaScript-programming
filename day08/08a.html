<!--
8a. Let's say in the Amazon project, we have a basketball product. This
product has a name of 'basketball', a price of 2095 cents. Create an
object to represent this product and display it in the console.
-->

<!DOCTYPE html>

<html>
    <head>
        Amazon Projects
    </head>
    <body>
        <h3>
        "We have basketball products"
        </h3>

        <script>
            const product1={
                name:"Basketball",
                price: 2095
            }

            const product2 = {
                name:"Football",
                price: 3091
            }
        </script>
        <button onclick="
        console.log(product1.name);
        console.log(product1.price);
        "
        >
        basketball
        </button>

        <button onclick="
        console.log(product2);
        "
        >
        Football
        </button>
    </body>
</html>
