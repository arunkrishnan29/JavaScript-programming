<!DOCTYPE html>

    <title>
          Time Viewer
    </title>
        <p>
          By refering the time the welcome messege may differ
        </p>
  </head>
      <body>
        <script>
          true
          false
          let greet='';
          let hour =5;
        /* changing hour value */

          hour=15;

          let Meridiem ='';

            if(hour<=0 && hour>=11.59){
                Meridiem='AM';
            }
            else{
                Meridiem='PM';
            }

          if (hour>=6 && hour<=12){
            greet='Good Morning';
          }
          else if(hour>=13 && hour<=17){
            greet='Good afternoon';
          }
          else{
            greet='Good Night';
          }
          console.log(`It's ${hour} ${Meridiem}`);
          console.log(`${greet}`);
        </script>
