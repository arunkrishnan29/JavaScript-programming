<!DOCTYPE html>
<html>
  <head>
    <Title>
      Amusement park Entry
    </Title>
    <p>
      Amusement park Entry Process for checking discount accoding to their age
    </p>
  </head>
    <body>
      <script>
        const age = 7;
        const name = 'Divin';
        let discount='';
        let ticket=2000;
        let discountamt=0;
        let final=0;
        if(age<=6 || age>=65){
          discount='kudos!! you are eligible for 12% discount ';
          discountamt=12;
        }
        else{
          discount='you are not eligile for 12%  discount , no worries you still have special offers ';
          discountamt=0;
        }

      if(discountamt!==0){
        final = ticket - (ticket * discountamt / 100);
        console.log(`hi ${name} ${discount} your final price is ${final}`);  
      
      }
      else{
        console.log(`hi ${name} ${discount} your final price is ${ticket}`);
      }
      </script>
    </body>
</html>
